<style>

  .card-img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s; }

  .card-name-en { font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--cream); letter-spacing:0.05em; }
  .card-name-ar { font-size:12px; color:var(--muted); margin-top:2px; }

  .modal-img { width:100%; height:100%; object-fit:cover; display:block; }
  .modal-img-nav { position:absolute; bottom:12px; right:12px; display:flex; gap:6px; }

  .modal-desc-ar { font-size:13px; color:rgba(107,101,96,.9); line-height:1.85; margin-top:7px; }

let lang = 'ar';
let currentP = null;
let selColor = null;
let selSize = null;
let imgIdx = 0;
let currentCat = 'all';

function renderGrid(filter='all') {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';
  PRODUCTS.forEach(p => {
    if (filter !== 'all' && p.cat !== filter) return;
    const colDots = p.colors.slice(0,5).map(c=>`<span class="color-dot" style="background:${c.h}"></span>`).join('');
    const more = p.colors.length > 5 ? `<span class="color-more">+${p.colors.length-5}</span>` : '';
    const card = document.createElement('div');
    card.className = 'product-card';
    card.onclick = () => openModal(p);
    card.innerHTML = `
      <div class="card-img-wrap">
        <img class="card-img" src="${p.imgs[0]}" alt="${p.en}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-name-en">${p.en}</div>
        <div class="card-name-ar">${p.ar}</div>
        <div class="card-type">${lang==='ar'?p.typeAr:p.typeEn}</div>
        ${p.colors.length ? `<div class="card-colors">${colDots}${more}</div>` : ''}
        <div class="card-cta">
          <span>${lang==='ar'?'اطلب الآن':'Order Now'}</span>
          <span style="font-size:16px">›</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(p) {
  currentP = p;
  imgIdx = 0;
  selColor = p.colors[0] || null;
  selSize = null;

  document.getElementById('m-type').textContent = lang==='ar'?p.typeAr:p.typeEn;
  document.getElementById('m-name-en').textContent = p.en;
  document.getElementById('m-name-ar').textContent = p.ar;

  document.getElementById('modal-img').src = p.imgs[0];
  document.getElementById('order-btn-text').textContent = lang==='ar'?'اطلب عبر واتساب':'Order via WhatsApp';
  document.getElementById('notes-lbl').textContent = lang==='ar'?'ملاحظات إضافية':'Additional notes';
  document.getElementById('notes-input').placeholder = lang==='ar'?(p.note||'أي تفاصيل إضافية...'):'Any additional details...';
  document.getElementById('notes-input').value = '';

  const nav = document.querySelector('.modal-img-nav');
  nav.style.display = p.imgs.length > 1 ? 'flex' : 'none';

  const cs = document.getElementById('color-sec');
  cs.style.display = p.colors.length ? 'block' : 'none';
  document.getElementById('color-lbl').textContent = lang==='ar'?'اختر اللون':'Select Color';
  document.getElementById('color-opts').innerHTML = p.colors.map((c,i)=>`
    <div class="color-option ${i===0?'selected':''}" onclick="pickColor(${i},this)">
      <div class="color-swatch" style="background:${c.h}"></div>
      <span class="color-name">${lang==='ar'?c.a:c.n}</span>
    </div>`).join('');

  const ss = document.getElementById('size-sec');
  ss.style.display = 'none';

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeOutside(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function nextImg() {
  if(!currentP) return;
  imgIdx = (imgIdx + 1) % currentP.imgs.length;
  document.getElementById('modal-img').src = currentP.imgs[imgIdx];
}
function prevImg() {
  if(!currentP) return;
  imgIdx = (imgIdx - 1 + currentP.imgs.length) % currentP.imgs.length;
  document.getElementById('modal-img').src = currentP.imgs[imgIdx];
}

function pickColor(i, el) {
  selColor = currentP.colors[i];
  document.querySelectorAll('.color-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
}
function pickSize(s, el) {
  selSize = s;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}

function sendOrder() {
  const notes = document.getElementById('notes-input').value;
  const color = selColor ? (lang==='ar'?selColor.a:selColor.n) : '';

  let msg = lang==='ar'
    ? `مرحباً، أود الطلب من the ROVN:\n\n`
    : `Hello, I'd like to order from the ROVN:\n\n`;
  msg += `▪ ${currentP.en} / ${currentP.ar}\n`;
  msg += `▪ ${lang==='ar'?'الصورة':'Image'}: ${currentP.imgs[0]}\n`;
  if(color) msg += `▪ ${lang==='ar'?'اللون':'Color'}: ${color}\n`;

  if(notes) msg += `▪ ${lang==='ar'?'ملاحظات':'Notes'}: ${notes}\n`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.dir = l==='ar'?'rtl':'ltr';
  document.getElementById('header-desc').textContent = l==='ar'
    ? 'قطع تتشكل حولك. كل لون وحجم بناءً على طلبك.'
    : 'Objects shaped around you. Every size and colour built to order.';
  document.querySelectorAll('#cats .cat-btn').forEach(b=>{ b.textContent = b.dataset[l]||b.textContent; });
  renderGrid(currentCat);
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(cat);
}

document.getElementById('wa-float').href = `https://wa.me/${WA_NUMBER}`;
renderGrid();
</script>
